name: jarvis

# Environment shared by langfuse-web and langfuse-worker.
x-langfuse-env: &langfuse-env
  DATABASE_URL: postgresql://jarvis:${POSTGRES_PASSWORD}@postgres:5432/langfuse
  SALT: ${LANGFUSE_SALT}
  ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
  TELEMETRY_ENABLED: "false"
  CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
  CLICKHOUSE_URL: http://clickhouse:8123
  CLICKHOUSE_USER: clickhouse
  CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
  CLICKHOUSE_CLUSTER_ENABLED: "false"
  LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
  LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
  LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
  LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
  LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
  LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
  LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
  LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
  LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
  LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
  LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://minio:9000
  LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_AUTH: ${REDIS_PASSWORD}
  TZ: ${TZ:-Europe/Athens}

services:
  caddy:
    build:
      context: .
      dockerfile: deploy/caddy/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - langfuse-web

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      JARVIS_ENV: ${JARVIS_ENV:-prod}
      JARVIS_DATABASE_URL: postgresql+psycopg://jarvis:${POSTGRES_PASSWORD}@postgres:5432/jarvis
      JARVIS_SECRET_KEY: ${JARVIS_SECRET_KEY}
      JARVIS_ADMIN_EMAIL: ${JARVIS_ADMIN_EMAIL}
      JARVIS_ADMIN_PASSWORD: ${JARVIS_ADMIN_PASSWORD}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # VPS: tailscale IP of the home server; home server: http://ollama:11434
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      LANGFUSE_HOST: http://langfuse-web:3000
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      GMAIL_ADDRESS: ${GMAIL_ADDRESS:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      TZ: ${TZ:-Europe/Athens}
    volumes:
      - files_data:/data/files
      - workspace_data:/data/workspace
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: jarvis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: jarvis
      TZ: ${TZ:-Europe/Athens}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarvis -d jarvis"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse-web:
    image: langfuse/langfuse:3
    restart: unless-stopped
    environment:
      <<: *langfuse-env
      NEXTAUTH_URL: https://traces.${DOMAIN}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      # Bootstrap org/project/user so API keys are deterministic and
      # the backend can trace immediately; then lock signup down.
      LANGFUSE_INIT_ORG_ID: jarvis
      LANGFUSE_INIT_ORG_NAME: Jarvis
      LANGFUSE_INIT_PROJECT_ID: jarvis
      LANGFUSE_INIT_PROJECT_NAME: jarvis
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_ADMIN_EMAIL}
      LANGFUSE_INIT_USER_NAME: admin
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_ADMIN_PASSWORD}
      AUTH_DISABLE_SIGNUP: "true"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    restart: unless-stopped
    environment:
      <<: *langfuse-env
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    restart: unless-stopped
    user: "101:101"
    # Single-user trace volume is tiny; never let ClickHouse balloon on an 8 GB box.
    mem_limit: 1536m
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    entrypoint: sh
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Home server only: docker compose --profile local-llm up -d
  # Docker-published ports bypass UFW, so the bind address itself must be
  # private: set OLLAMA_BIND_IP to the home server's Tailscale IP (100.x.y.z).
  # The 127.0.0.1 default never exposes it beyond the box.
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    profiles: ["local-llm"]
    ports:
      - "${OLLAMA_BIND_IP:-127.0.0.1}:11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  files_data:
  workspace_data:
  clickhouse_data:
  clickhouse_logs:
  minio_data:
  ollama_data:
